  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n:root{\n  --blue:#4169E1; --blue-dark:#2A4DB5; --blue-deep:#0D1B4E;\n  --blue-light:#EEF2FF; --blue-mid:#C7D3F8;\n  --white:#FFFFFF; --paper:#F8F9FF; --ink:#0D1B4E;\n  --muted:#5A6490; --border:#D4DCEF; --border-light:#E8EDFB;\n  --orange:#FF5500; --orange-light:#FFF0E8;\n  --green:#16A34A;\n}\n*{margin:0;padding:0;box-sizing:border-box;}\nhtml{scroll-behavior:smooth;}\nbody{background:var(--white);color:var(--ink);font-family:'Barlow',sans-serif;overflow-x:hidden;}\n\n/* ── GRID TEXTURE ── */\n.grid-bg{background-image:linear-gradient(rgba(65,105,225,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(65,105,225,0.05) 1px,transparent 1px);background-size:40px 40px;}\n.dot-bg{background-image:radial-gradient(circle,rgba(65,105,225,0.08) 1px,transparent 1px);background-size:24px 24px;}\n\n/* ── NAV ── */\nnav{\n  position:fixed;top:0;left:0;right:0;z-index:200;\n  display:flex;align-items:center;justify-content:space-between;\n  padding:0 5vw;height:70px;\n  background:rgba(255,255,255,0.97);\n  backdrop-filter:blur(16px);\n  border-bottom:1px solid var(--border);\n  box-shadow:0 2px 20px rgba(65,105,225,0.08);\n}\n.nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}\n.nav-logo img{height:44px;width:auto;object-fit:contain;}\n.nav-wordmark{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:0.04em;color:var(--blue-deep);display:flex;flex-direction:column;line-height:1;white-space:nowrap;}\n.nav-wordmark small{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;}\n.nav-links{display:flex;align-items:center;gap:2px;list-style:none;flex-wrap:nowrap;}\n.nav-links a{color:var(--muted);text-decoration:none;font-size:12px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;padding:8px 10px;white-space:nowrap;transition:color 0.2s,background 0.2s;}\n.nav-links a:hover{color:var(--blue);background:var(--blue-light);}\n.nav-links a.active-link{color:var(--blue);border-bottom:2px solid var(--blue);}\n.nav-cta{background:var(--blue)!important;color:#fff!important;padding:10px 16px!important;clip-path:polygon(0 0,92% 0,100% 25%,100% 100%,8% 100%,0 75%)!important;font-size:12px!important;}\n.nav-cta:hover{background:var(--blue-dark)!important;color:#fff!important;}\n.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;}\n.hamburger span{width:22px;height:2px;background:var(--ink);display:block;}\n\n/* ── HERO ── */\n#home{\n  min-height:100vh;\n  background:var(--blue-deep);\n  display:flex;align-items:center;\n  padding:120px 5vw 80px;\n  position:relative;overflow:hidden;\n}\n.hero-grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:56px 56px;}\n.hero-glow{position:absolute;top:-10%;right:-5%;width:65vw;height:120%;background:radial-gradient(ellipse,rgba(65,105,225,0.3) 0%,transparent 60%);pointer-events:none;}\n.hero-glow2{position:absolute;bottom:-20%;left:-10%;width:50vw;height:80%;background:radial-gradient(ellipse,rgba(65,105,225,0.15) 0%,transparent 65%);pointer-events:none;}\n\n/* Engineering schematic SVG hero deco */\n.hero-schematic{position:absolute;right:4vw;top:50%;transform:translateY(-50%);width:min(520px,46vw);opacity:0.12;pointer-events:none;z-index:0;}\n\n.hero-content{position:relative;z-index:2;max-width:680px;}\n.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(65,105,225,0.25);border:1px solid rgba(65,105,225,0.4);padding:7px 18px;margin-bottom:28px;font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#93AEFF;}\n.hero-badge::before{content:'';width:6px;height:6px;background:#93AEFF;border-radius:50%;animation:blink 1.5s infinite;}\n@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}\n#home h1,.hero h1{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(54px,8.5vw,118px);line-height:0.9;letter-spacing:-0.02em;text-transform:uppercase;color:#fff !important;}\n#home h1 em,.hero h1 em{font-style:normal;color:#7B9EFF;}\n#home .hero-ml,.hero-ml{font-family:'Barlow Condensed',sans-serif;font-size:clamp(16px,2vw,24px);color:rgba(255,255,255,0.45) !important;margin-top:16px;font-weight:600;}\n#home .hero-sub,.hero-sub{font-size:16px;color:rgba(255,255,255,0.6) !important;max-width:480px;margin-top:20px;line-height:1.7;}\n.hero-actions{display:flex;align-items:center;gap:18px;margin-top:44px;flex-wrap:wrap;}\n.btn-primary{display:inline-flex;align-items:center;gap:10px;background:var(--blue);color:#fff;padding:16px 36px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:18px;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;clip-path:polygon(0 0,90% 0,100% 20%,100% 100%,10% 100%,0 80%);transition:background 0.2s,transform 0.2s;}\n.btn-primary:hover{background:var(--blue-dark);transform:translateY(-2px);}\n.btn-ghost-white{display:inline-flex;align-items:center;gap:8px;color:rgba(255,255,255,0.65);text-decoration:none;font-weight:600;font-size:14px;border-bottom:1.5px solid rgba(255,255,255,0.2);padding-bottom:2px;transition:color 0.2s;}\n.btn-ghost-white:hover{color:#fff;}\n\n/* ── STATS BAR ── */\n.stats-bar{background:var(--blue);display:grid;grid-template-columns:repeat(4,1fr);}\n.stat-cell{padding:28px 28px;border-right:1px solid rgba(255,255,255,0.15);position:relative;}\n.stat-cell:last-child{border-right:none;}\n.stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:46px;color:#fff;line-height:1;}\n.stat-lbl{font-size:11px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:rgba(255,255,255,0.65);margin-top:4px;}\n\n/* ── SHARED SECTION STYLES ── */\n.eyebrow{font-size:11px;font-weight:800;letter-spacing:0.2em;text-transform:uppercase;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:10px;}\n.eyebrow::before{content:'';width:22px;height:2px;background:var(--blue);}\n.eyebrow.light{color:rgba(123,158,255,0.9);}\n.eyebrow.light::before{background:rgba(123,158,255,0.9);}\n.sec-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(34px,4.8vw,64px);line-height:0.95;text-transform:uppercase;color:var(--ink);letter-spacing:-0.01em;}\n.sec-title em{font-style:normal;color:var(--blue);}\n.sec-title.on-dark{color:#fff;}\n.sec-title.on-dark em{color:#7B9EFF;}\nsection{padding:96px 5vw;}\n\n/* ── AFFILIATION BAND ── */\n.affil-band{background:var(--paper);border-bottom:1px solid var(--border);padding:24px 5vw;display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center;}\n.affil-label{font-size:10px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);}\n.affil-pill{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--border);padding:8px 16px;}\n.affil-pill img{height:24px;width:auto;object-fit:contain;}\n.affil-pill span{font-size:11px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--blue-deep);}\n\n/* ── WHY ITI ── */\n#why{background:var(--paper);}\n.why-layout{display:grid;grid-template-columns:1fr 1fr;gap:72px;margin-top:56px;align-items:start;}\n.compare-table{width:100%;border-collapse:collapse;}\n.compare-table thead th{padding:13px 18px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:0.08em;text-transform:uppercase;text-align:left;border-bottom:2px solid var(--border);}\n.compare-table th.col-iti{background:rgba(65,105,225,0.07);color:var(--blue);border-left:3px solid var(--blue);}\n.compare-table th.col-og{color:var(--muted);}\n.compare-table tbody tr{border-bottom:1px solid var(--border-light);}\n.compare-table tbody tr:hover{background:rgba(65,105,225,0.03);}\n.compare-table td{padding:12px 18px;font-size:13px;color:var(--muted);vertical-align:middle;}\n.compare-table td:first-child{font-weight:700;color:var(--ink);font-size:12px;letter-spacing:0.04em;text-transform:uppercase;}\n.compare-table td.col-iti{background:rgba(65,105,225,0.05);color:var(--ink);font-weight:700;border-left:3px solid var(--blue);}\n.chk{color:var(--green);font-weight:800;}\n.crs{color:#DC2626;}\n.why-cards{display:flex;flex-direction:column;gap:16px;}\n.why-card{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--blue);padding:24px;display:flex;gap:18px;transition:box-shadow 0.2s;}\n.why-card:hover{box-shadow:0 4px 24px rgba(65,105,225,0.1);}\n.wc-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:rgba(65,105,225,0.2);min-width:36px;line-height:1;}\n.wc-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;text-transform:uppercase;color:var(--blue-deep);margin-bottom:5px;}\n.wc-desc{font-size:13px;color:var(--muted);line-height:1.65;}\n\n/* ── COURSES ── */\n#courses{background:var(--white);}\n.courses-intro{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:52px;flex-wrap:wrap;gap:16px;}\n.courses-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}\n.course-card{background:var(--white);padding:36px 30px;position:relative;overflow:hidden;cursor:pointer;transition:background 0.2s;text-decoration:none;color:var(--ink);display:block;}\n.course-card:hover{background:var(--blue-light);}\n.course-card:hover .cc-arrow{opacity:1;transform:translate(4px,-4px);}\n.course-card:hover .cc-top-line{transform:scaleX(1);}\n.cc-top-line{position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);transform:scaleX(0);transform-origin:left;transition:transform 0.3s;}\n.cc-icon{font-size:36px;margin-bottom:16px;display:block;}\n.cc-dur{font-size:10px;font-weight:800;letter-spacing:0.16em;text-transform:uppercase;color:var(--blue);background:var(--blue-light);padding:4px 10px;display:inline-block;margin-bottom:14px;}\n.cc-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;line-height:1.05;text-transform:uppercase;color:var(--blue-deep);margin-bottom:10px;}\n.cc-desc{font-size:13px;color:var(--muted);line-height:1.65;margin-bottom:16px;}\n.cc-tags{display:flex;flex-wrap:wrap;gap:6px;}\n.cc-tag{font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--muted);border:1px solid var(--border);padding:3px 9px;background:var(--paper);}\n.cc-arrow{position:absolute;bottom:24px;right:24px;color:var(--blue);font-size:20px;opacity:0;transition:opacity 0.2s,transform 0.2s;}\n\n/* ── PATHWAY DIAGRAM ── */\n#pathway{background:var(--blue-deep);padding:96px 5vw;position:relative;overflow:hidden;}\n#pathway::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);background-size:48px 48px;}\n.pathway-inner{position:relative;z-index:1;max-width:1000px;margin:0 auto;}\n.pw-desc{font-size:15px;color:rgba(255,255,255,0.45);max-width:540px;line-height:1.65;margin:14px 0 56px;}\n/* TOP */\n.pw-top{display:flex;justify-content:center;margin-bottom:0;}\n.pw-node-10{background:var(--blue);color:#fff;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;text-transform:uppercase;padding:16px 48px;letter-spacing:0.06em;clip-path:polygon(0 0,94% 0,100% 25%,100% 100%,6% 100%,0 75%);}\n/* CONNECTOR */\n.pw-connector{display:flex;justify-content:center;align-items:center;height:48px;position:relative;}\n.pw-connector::before{content:'';position:absolute;left:50%;width:2px;height:100%;background:rgba(255,255,255,0.35);transform:translateX(-50%);}\n/* SPLIT */\n.pw-split{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:flex-start;margin-top:0;position:relative;}\n.pw-split-line{width:2px;background:rgba(255,255,255,0.2);margin:0 auto;align-self:stretch;min-height:100%;}\n.pw-col-left,.pw-col-right{padding:0 20px;}\n/* ITI BOX */\n.pw-iti-box{background:rgba(65,105,225,0.2);border:2px solid var(--blue);padding:20px 24px;text-align:center;margin-bottom:20px;}\n.pw-iti-label{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#93AEFF;margin-bottom:6px;}\n.pw-iti-name{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;text-transform:uppercase;color:#fff;}\n.pw-iti-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-top:4px;}\n.pw-pass-note{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(255,255,255,0.25);text-align:center;margin-bottom:16px;}\n/* OUTCOMES */\n.pw-job-card{background:rgba(65,105,225,0.12);border:1px solid rgba(65,105,225,0.3);padding:16px 18px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;}\n.pw-job-icon{font-size:20px;}\n.pw-job-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:15px;text-transform:uppercase;color:#fff;margin-bottom:3px;}\n.pw-job-desc{font-size:11px;color:rgba(255,255,255,0.45);line-height:1.5;}\n.pw-studies-label{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:rgba(123,158,255,0.6);margin:14px 0 10px;text-align:center;}\n.pw-paths-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}\n.pw-path-col{display:flex;flex-direction:column;align-items:center;gap:4px;}\n.pw-step-box{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:9px 12px;text-align:center;width:100%;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;text-transform:uppercase;}\n.pw-step-box small{display:block;font-size:10px;color:rgba(255,255,255,0.35);font-weight:500;text-transform:none;margin-top:1px;}\n.pw-step-box.highlight{background:rgba(65,105,225,0.2);border-color:rgba(65,105,225,0.4);}\n.pw-arr{color:rgba(123,158,255,0.4);font-size:16px;line-height:1;}\n/* PLUS 2 */\n.pw-plus2-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);padding:18px 22px;text-align:center;margin-bottom:16px;}\n.pw-plus2-box .pw-iti-name{color:rgba(255,255,255,0.4);}\n.pw-plus2-path{display:flex;flex-direction:column;align-items:center;gap:4px;}\n.pw-p2-box{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);color:rgba(255,255,255,0.35);padding:10px 16px;text-align:center;width:100%;max-width:220px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:15px;text-transform:uppercase;}\n.pw-p2-box small{display:block;font-size:10px;color:rgba(255,255,255,0.2);text-transform:none;margin-top:2px;}\n.pw-warn{background:rgba(220,38,38,0.08);border:1px solid rgba(220,38,38,0.15);color:rgba(220,100,100,0.8);font-size:11px;padding:10px 14px;text-align:center;margin-top:10px;line-height:1.6;max-width:220px;}\n/* BENEFITS */\n.pw-benefits{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:48px;padding-top:36px;border-top:1px solid rgba(255,255,255,0.07);}\n.pw-benefit{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);padding:9px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,0.65);letter-spacing:0.04em;}\n\n/* ── ENGINEERING DEMAND ── */\n#demand{background:var(--paper);}\n.demand-layout{display:grid;grid-template-columns:1fr 1fr;gap:72px;margin-top:56px;align-items:center;}\n.demand-stats{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:var(--border);}\n.demand-stat{background:var(--white);padding:32px 28px;position:relative;overflow:hidden;}\n.demand-stat::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--blue);}\n.demand-stat-num{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;color:var(--blue-deep);line-height:1;}\n.demand-stat-lbl{font-size:12px;font-weight:600;color:var(--muted);margin-top:6px;line-height:1.4;}\n.demand-quote{font-size:17px;font-weight:500;color:var(--muted);line-height:1.75;border-left:4px solid var(--blue);padding-left:20px;margin:24px 0;}\n.demand-quote strong{color:var(--ink);}\n/* Engineering icons grid */\n.eng-icons{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:32px;}\n.eng-icon-chip{background:var(--blue-light);border:1px solid var(--blue-mid);padding:16px 12px;text-align:center;}\n.eng-icon-chip svg{width:32px;height:32px;color:var(--blue);}\n.eng-icon-chip span{display:block;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--blue);margin-top:6px;}\n\n/* ── ABOUT / LEGACY ── */\n#about{background:var(--white);}\n.about-layout{display:grid;grid-template-columns:1fr 1fr;gap:80px;margin-top:56px;align-items:center;}\n.about-visual{position:relative;}\n.about-img{width:100%;aspect-ratio:4/3;object-fit:cover;border:1px solid var(--border);}\n.about-placeholder{width:100%;aspect-ratio:4/3;background:var(--paper);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;position:relative;overflow:hidden;}\n.about-placeholder .dot-bg{position:absolute;inset:0;}\n.about-year-stamp{position:absolute;bottom:-12px;right:10px;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:clamp(80px,12vw,140px);color:rgba(65,105,225,0.07);line-height:1;user-select:none;}\n.about-quote{font-family:'Barlow Condensed',sans-serif;font-size:clamp(18px,2.2vw,28px);font-weight:700;line-height:1.4;color:var(--blue-deep);border-left:4px solid var(--blue);padding-left:20px;margin:22px 0;}\n.about-body{font-size:15px;color:var(--muted);line-height:1.8;margin-bottom:14px;}\n.founder-row{display:flex;align-items:center;gap:14px;margin-top:28px;}\n.founder-hex{width:52px;height:52px;background:var(--blue);clip-path:polygon(0 0,85% 0,100% 15%,100% 100%,15% 100%,0 85%);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;color:#fff;}\n.founder-nm{font-weight:800;font-size:15px;color:var(--blue-deep);}\n.founder-ttl{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;}\n.text-link{display:inline-flex;align-items:center;gap:6px;color:var(--blue);text-decoration:none;font-weight:700;font-size:14px;border-bottom:1.5px solid var(--blue-mid);padding-bottom:1px;margin-top:20px;transition:border-color 0.2s;}\n.text-link:hover{border-color:var(--blue);}\n\n/* ── CONTACT / APPLY ── */\n#contact{background:var(--blue-deep);padding:96px 5vw;position:relative;overflow:hidden;}\n#contact::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:24px 24px;}\n.contact-inner{position:relative;z-index:1;}\n.contact-layout{display:grid;grid-template-columns:1fr 1fr;gap:72px;margin-top:56px;align-items:start;}\n/* Left info */\n.contact-info{display:flex;flex-direction:column;gap:0;}\n.ci-block{display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(255,255,255,0.07);align-items:flex-start;}\n.ci-block:first-child{border-top:1px solid rgba(255,255,255,0.07);}\n.ci-icon{width:40px;height:40px;background:rgba(65,105,225,0.2);border:1px solid rgba(65,105,225,0.3);display:flex;align-items:center;justify-content:center;font-size:17px;min-width:40px;flex-shrink:0;}\n.ci-lbl{font-size:10px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;color:#7B9EFF;margin-bottom:5px;}\n.ci-val{font-size:14px;font-weight:600;color:rgba(255,255,255,0.8);line-height:1.6;}\n.ci-val a{color:rgba(255,255,255,0.8);text-decoration:none;transition:color 0.2s;}\n.ci-val a:hover{color:#fff;}\n.elig-chips-list{display:flex;flex-direction:column;gap:8px;margin-top:32px;}\n.elig-chip{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;color:rgba(255,255,255,0.7);}\n.elig-chip::before{c
